version: '3.9'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: connect_in_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: connect_in
      MYSQL_USER: connect_in_user
      MYSQL_PASSWORD: connect_in_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - connect_in_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  # Laravel Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: connect_in_backend
    restart: always
    environment:
      APP_NAME: "Connect'In"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: connect_in
      DB_USERNAME: connect_in_user
      DB_PASSWORD: connect_in_pass
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - connect_in_network
    working_dir: /app
    command: php artisan serve --host=0.0.0.0 --port=8000

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: connect_in_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - connect_in_network
    working_dir: /app

volumes:
  mysql_data:
    driver: local

networks:
  connect_in_network:
    driver: bridge
