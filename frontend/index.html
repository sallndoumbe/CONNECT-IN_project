<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect'In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <!-- API: http://localhost:8000/api (backend Laravel) -->

    <nav id="navigation" class="bg-blue-600 text-white p-4 hidden shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center flex-wrap gap-4">
            <h1 class="text-2xl font-bold">Connect'In</h1>
            
            <div class="flex items-center space-x-2 w-full md:w-auto">
                <input type="text" id="recherche-texte" placeholder="Rechercher..." class="p-1 rounded text-black w-full md:w-48">
                <button onclick="rechercher()" class="bg-blue-800 px-3 py-1 rounded hover:bg-blue-900">Go</button>
            </div>

            <div class="space-x-4 flex items-center">
                <button onclick="afficherVue('vue-accueil')" class="hover:underline">Actualités</button>
                <button onclick="afficherVue('vue-profil')" class="hover:underline">Profil</button>
                <button onclick="deconnexion()" class="bg-red-500 px-3 py-1 rounded hover:bg-red-600">Déconnexion</button>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto mt-8 p-4">
        
        <div id="vue-authentification" class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md">
            <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">Connect'In</h2>
            
            <form id="formulaire-connexion" onsubmit="gererConnexion(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium">Email professionnel</label>
                    <input type="email" id="email-connexion" required class="w-full border p-2 rounded mt-1">
                </div>
                <div>
                    <label class="block text-sm font-medium">Mot de passe</label>
                    <input type="password" id="mdp-connexion" required class="w-full border p-2 rounded mt-1">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Se connecter</button>
            </form>

            <hr class="my-6">

            <h3 class="text-xl font-bold mb-4 text-center">Nouveau utilisateur ?</h3>
            <form id="formulaire-inscription" onsubmit="gererInscription(event)" class="space-y-4">
                <div class="flex space-x-2">
                    <div class="w-1/2">
                        <label class="block text-sm font-medium">Prénom</label>
                        <input type="text" id="prenom-inscription" required class="w-full border p-2 rounded mt-1">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-sm font-medium">Nom</label>
                        <input type="text" id="nom-inscription" required class="w-full border p-2 rounded mt-1">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium">Email professionnel</label>
                    <input type="email" id="email-inscription" required class="w-full border p-2 rounded mt-1">
                </div>
                <div>
                    <label class="block text-sm font-medium">Mot de passe</label>
                    <input type="password" id="mdp-inscription" required class="w-full border p-2 rounded mt-1">
                </div>
                <button type="submit" class="w-full bg-green-500 text-white p-2 rounded hover:bg-green-600">S'inscrire</button>
            </form>
        </div>

        <div id="vue-accueil" class="hidden space-y-6">
            <div class="bg-white p-4 rounded-lg shadow">
                <form onsubmit="creerPublication(event)">
                    <textarea id="contenu-publication" rows="3" placeholder="Partagez avec vos collègues..." class="w-full border p-2 rounded mb-2" required></textarea>
                    <div class="flex justify-between items-center">
                        <input type="file" id="image-publication" class="text-sm text-gray-500" accept="image/*">
                        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Publier</button>
                    </div>
                </form>
            </div>

            <div class="flex justify-end mb-4">
                <select id="filtre-publications" onchange="chargerPublications()" class="border p-2 rounded">
                    <option value="recent">Plus récents</option>
                    <option value="populaire">Plus populaires</option>
                </select>
            </div>

            <div id="conteneur-publications" class="space-y-4">
            </div>
        </div>

        <div id="vue-profil" class="hidden max-w-md mx-auto bg-white p-8 rounded-lg shadow-md">
            <h2 class="text-2xl font-bold mb-6">Mon Profil</h2>
            
            <form id="formulaire-profil" onsubmit="modifierProfil(event)" class="space-y-4 mb-6">
                <div>
                    <label class="block text-sm font-medium">Photo de profil</label>
                    <input type="file" id="photo-profil" class="w-full border p-2 rounded mt-1" accept="image/*">
                </div>
                <div class="flex space-x-2">
                    <div class="w-1/2">
                        <label class="block text-sm font-medium">Prénom</label>
                        <input type="text" id="profil-prenom" required class="w-full border p-2 rounded mt-1">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-sm font-medium">Nom</label>
                        <input type="text" id="profil-nom" required class="w-full border p-2 rounded mt-1">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium">Email</label>
                    <input type="email" id="profil-email" required class="w-full border p-2 rounded mt-1">
                </div>
                <div>
                    <label class="block text-sm font-medium">Nouveau mot de passe (optionnel)</label>
                    <input type="password" id="profil-mdp" class="w-full border p-2 rounded mt-1">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Mettre à jour</button>
            </form>

            <hr class="my-6">
            <button onclick="supprimerCompte()" class="w-full bg-red-600 text-white p-2 rounded hover:bg-red-700">Supprimer mon compte</button>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
